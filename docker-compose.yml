version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: sop10_postgres
    environment:
      POSTGRES_USER: trader
      POSTGRES_PASSWORD: tradersecret
      POSTGRES_DB: sop10_trader
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U trader"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
